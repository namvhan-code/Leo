<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyxor Store Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #FEF4DD 0%, #EBFAFF 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        @keyframes float-up-down { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes float-left-right { 0%, 100% { transform: translateX(0px) rotate(0deg); } 50% { transform: translateX(15px) rotate(-10deg); } }
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes dash-animation { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -24; } }
        
        .animate-dash { animation: dash-animation 1s linear infinite; }
        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(138, 180, 204, 0.2);
        }

        .virtual-card { transition: all 0.3s ease; }
        .virtual-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="flex flex-col items-center py-6 px-4 text-[#5c7d9e]">

    <div id="toast" style="display:none;" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-[#CAE4F4] text-[#5c7d9e] px-6 py-3 rounded-full shadow-xl z-50 font-bold">
        คัดลอกเลขบัญชีแล้ว!
    </div>

    <div class="max-w-[420px] w-full space-y-5">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-[#5c7d9e]">Nyxor STORE</h1>
            <p class="text-sm text-[#CAE4F4] font-bold">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-6">
            <div class="space-y-4">
                <div class="bg-[#EBFAFF] p-4 rounded-2xl border-2 border-[#CAE4F4]">
                    <p class="text-center font-bold">ชื่อบัญชี: ธนกฤต แซ่จิว</p>
                </div>

                <div class="virtual-card bg-[#CAE4F4] rounded-[24px] p-5 cursor-pointer border border-[#CAE4F4]" onclick="copyText('898-235317-9')">
                    <p class="text-xs font-bold text-[#5c7d9e]/70">SCB</p>
                    <p class="text-2xl font-bold">898-235317-9</p>
                </div>

                <div class="virtual-card bg-[#FEF4DD] rounded-[24px] p-5 cursor-pointer border border-[#FEF4DD]" onclick="copyText('0980086337')">
                    <p class="text-xs font-bold text-[#5c7d9e]/70">TrueMoney (ธนกฤต)</p>
                    <p class="text-2xl font-bold">0980086337</p>
                </div>

                <div class="virtual-card bg-[#FEF4DD] rounded-[24px] p-5 cursor-pointer border border-[#FEF4DD]" onclick="copyText('0936207180')">
                    <p class="text-xs font-bold text-[#5c7d9e]/70">TrueMoney (ชนัญญา)</p>
                    <p class="text-2xl font-bold">0936207180</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
